name: Daily Horizon Summary

on:
  # schedule:
    # - cron: '30 8 * * *'  # Runs every day at 8:30 AM
    #   timezone: 'Asia/Shanghai'
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.friend.json data/config.json

      - name: Run Horizon
        env:
          # Map secrets to environment variables expected by config.json
          # Modify these based on your data/config.github.json provider settings
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HORIZON_AI_BASE_URL: ${{ secrets.HORIZON_AI_BASE_URL }}
          HORIZON_NTFY_TOPIC_PM: ${{ secrets.HORIZON_NTFY_TOPIC_PM }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
        run: uv run horizon

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages-pm
          enable_jekyll: true

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages-pm
          path: built-site-src

      - name: Create Gemfile
        run: |
          cd built-site-src
          echo 'source "https://rubygems.org"' > Gemfile
          echo 'gem "jekyll", "~> 4.3"' >> Gemfile
          echo 'gem "jekyll-theme-cayman"' >> Gemfile
          echo 'gem "jekyll-feed"' >> Gemfile

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true  # 开启缓存，下一次运行只需几秒钟
          working-directory: built-site-src

      - name: Build Jekyll site
        run: |
          cd built-site-src
          bundle exec jekyll build --baseurl "" --destination ../dist-html
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist-html --project-name=bao-horizon
