      #     publish_branch: gh-pages
      #     enable_jekyll: true

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: built-site-src
      
      - name: Create Gemfile
        run: |
          cd built-site-src
          # 1. 动态创建 Gemfile
          echo 'source "https://rubygems.org"' > Gemfile
          echo 'gem "jekyll", "~> 4.3"' >> Gemfile
          echo 'gem "jekyll-theme-cayman"' >> Gemfile
          echo 'gem "jekyll-feed"' >> Gemfile
          
          # 2. 关键修复：赋予当前目录以及输出目录所有用户可读写权限 (777)
          # 这样 Docker 容器内的非 root 用户就可以写入 Gemfile.lock 和静态文件了
          chmod -R 777 .
          mkdir -p ../dist-html
          chmod -R 777 ../dist-html
          
          # 3. 使用 Docker 构建 Jekyll 站点
          docker run --rm \
            -v "$PWD:/srv/jekyll" \
            -v "$PWD/../dist-html:/srv/jekyll/_site" \
            jekyll/jekyll:4.2.0 \
            bash -c "bundle install && jekyll build"
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ../dist-html --project-name=horizon
