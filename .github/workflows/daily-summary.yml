name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 5 * * *'  # Runs every day at 5:00 AM
      timezone: 'Asia/Shanghai'
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
